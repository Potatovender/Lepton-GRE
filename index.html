<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lepton-GRE</title>
    <meta
      name="description"
      content="Lepton-GRE is a browser-based mathematical grid renderer and function visualizer with MathQuill editing, Lepton Text Code, GLSL rendering, colors, bounds, and recursive references."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://potatovender.github.io/Lepton-GRE/" />
    <meta property="og:title" content="Lepton-GRE" />
    <meta property="og:description" content="Create and render mathematical grid art with a Desmos-style editor and Lepton Text Code." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://potatovender.github.io/Lepton-GRE/" />
    <link rel="stylesheet" href="./src/libs/mathquill/style.css" />
    <link rel="stylesheet" href="./src/styles.css?v=20260607-recursion-thresholds" />
  </head>
  <body>
    <div id="app">
      <main class="app-shell">
        <section class="expression-panel" aria-label="Expression editor">
          <header class="panel-header">
            <div class="brand-row">
              <strong>Lepton-GRE</strong>
              <span class="loading-note">Loading editor...</span>
            </div>
          </header>
          <nav class="tab-row" aria-label="Editor sections">
            <button class="tab-button" aria-selected="true">Functions</button>
            <button class="tab-button" aria-selected="false">Colors</button>
            <button class="tab-button" aria-selected="false">Bounds</button>
            <button class="tab-button" aria-selected="false">Draw</button>
          </nav>
          <div class="entry-list">
            <div class="expression-row">
              <span class="entry-status valid"></span>
              <textarea class="math-box" aria-label="Expression">eq = sin(x) + cos(y)</textarea>
            </div>
          </div>
        </section>
        <section class="renderer-pane" aria-label="Grid renderer">
          <canvas class="grid-canvas"></canvas>
          <div class="render-overlay">Open through a local server for the interactive preview.</div>
        </section>
      </main>
    </div>
    <script src="./src/libs/mathquill/index.global.js"></script>
    <script type="module" src="./src/browser-preview-live.js?v=20260607-recursion-thresholds"></script>
  </body>
</html>
