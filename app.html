<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lepton GRE App</title>
    <meta
      name="description"
      content="Launch the Lepton-GRE mathematical grid renderer and function visualizer."
    />
    <link rel="icon" href="./src/assets/lepton-favicon.png?v=20260721-cloud-functions" type="image/png" />
    <link rel="shortcut icon" href="./src/assets/lepton-favicon.png?v=20260721-cloud-functions" type="image/png" />
    <link rel="apple-touch-icon" href="./src/assets/lepton-favicon.png?v=20260721-cloud-functions" />
    <link rel="stylesheet" href="./src/libs/mathquill/style.css" />
    <link rel="stylesheet" href="./src/styles.css?v=20260721-cloud-functions" />
  </head>
  <body>
    <div id="app">
      <main class="app-shell">
        <section class="expression-panel" aria-label="Expression editor">
          <header class="panel-header">
            <div class="brand-row">
              <a class="brand-link" href="./index.html" aria-label="Go to Lepton landing page">
                <img src="./src/assets/lepton-logo-transparent.png" alt="" />
                <strong>Lepton GRE</strong>
              </a>
              <span class="loading-note">Loading editor...</span>
            </div>
          </header>
          <nav class="tab-row" aria-label="Editor sections">
            <button class="tab-button" aria-selected="true">Functions</button>
            <button class="tab-button" aria-selected="false">Colors</button>
            <button class="tab-button" aria-selected="false">Bounds</button>
            <button class="tab-button" aria-selected="false">Draw</button>
          </nav>
          <div class="entry-list">
            <div class="expression-row">
              <span class="entry-status valid"></span>
              <textarea class="math-box" aria-label="Expression">eq = sin(x) + cos(y)</textarea>
            </div>
          </div>
        </section>
        <section class="renderer-pane" aria-label="Grid renderer">
          <canvas class="grid-canvas"></canvas>
          <div class="render-overlay">Open through a local server for the interactive preview.</div>
        </section>
      </main>
    </div>
    <script src="./src/libs/mathquill/index.global.js"></script>
    <script type="module" src="./src/browser-preview-live.js?v=20260721-cloud-functions"></script>
  </body>
</html>
